# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900   # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
paths = ["/Users/liuqianli/work/skills/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(mkdir -p:*)", "Edit", "Bash(cp skills/go-development/go/references/gin-openapi-json-conventions.md:*)", "Bash(cp skills/go-development/go/assets/openapi.json:*)", "install_source", "Bash(ls -la ~/work/skills/ | grep -E '^d.*~' ; ls -ld ~/work/skills/~ 2>/dev/null || echo \"No ~ directory found in project root\")", "Bash(find ~/work/skills -maxdepth 2 -name '~' -type d 2>/dev/null)", "Bash(grep -rn '\"~' skills/*/resources/update.sh skills/*/resources/*.sh 2>/dev/null; grep -rn \"'~'\" skills/*/resources/update.sh skills/*/resources/*.sh 2>/dev/null)", "Bash(find /Users/liuqianli/work/skills -maxdepth 3 -name '~' -type d 2>/dev/null; echo \"exit: $?\")", "Bash(find /Users/liuqianli/work/skills -type d -name scripts 2>/dev/null)", "Bash(cd /Users/liuqianli/work/skills && echo \"=== code-quality references ===\" && ls skills/code-quality/code-quality/references/*.md 2>/dev/null || echo \"MISSING\" && echo \"=== architecture-planning references ===\" && ls skills/architecture-planning/architecture-planning/references/*.md 2>/dev/null || echo \"MISSING\" && echo \"=== documents references ===\" && ls skills/documents/documents/references/*.md 2>/dev/null || echo \"MISSING\" && echo \"=== manifests ===\" && ls skills/manifests/public-*.txt 2>/dev/null || echo \"MISSING\")", "Bash(cd /Users/liuqianli/work/skills && grep -rn '\"~' scripts/ skills/*/resources/update.sh 2>/dev/null; grep -rn \"'~'\" scripts/ skills/*/resources/update.sh 2>/dev/null; grep -rn 'mkdir.*~' scripts/ skills/*/resources/update.sh 2>/dev/null; grep -rn 'cp.*~' scripts/ skills/*/resources/update.sh 2>/dev/null)", "Bash(chmod +x:*)", "Bash(cd /Users/liuqianli/work/skills && echo \"=== Test 1: METHOD + PATH ===\" && bash skills/gin-openapi-json/scripts/generate.sh PUT /api/v2/scanner/detect/policy && echo \"\" && echo \"=== Test 2: METHOD + PATH with --output ===\" && bash skills/gin-openapi-json/scripts/generate.sh PUT /api/v2/scanner/detect/policy --output docs/policy.json && echo \"\" && echo \"=== Test 3: Handler name ===\" && bash skills/gin-openapi-json/scripts/generate.sh UserAPI.CreateUser && echo \"\" && echo \"=== Test 4: No args (should fail) ===\" && bash skills/gin-openapi-json/scripts/generate.sh 2>&1 || true && echo \"\" && echo \"=== Test 5: Bad flag ===\" && bash skills/gin-openapi-json/scripts/generate.sh --bad-flag 2>&1 || true)", "Bash(cd /tmp && mkdir -p test-gin-project && cd test-gin-project && touch go.mod && echo \"=== METHOD+PATH, auto-name ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh PUT /api/v2/scanner/detect/policy && echo \"\" && echo \"=== METHOD+PATH, --output ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh PUT /api/v2/scanner/detect/policy --output docs/policy.json && echo \"\" && echo \"=== Handler name ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh UserAPI.CreateUser && echo \"\" && echo \"=== No args ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh 2>&1; echo \"exit: $?\" && rm -rf /tmp/test-gin-project)", "Bash(cd /tmp && mkdir -p test-gin-project && cd test-gin-project && touch go.mod && echo \"=== Handler ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh UserAPI.CreateUser && echo \"\" && echo \"=== Route ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh PUT /api/v2/scanner/detect/policy && echo \"\" && echo \"=== Short route ===\" && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh DELETE /api/v1/users/:id && rm -rf /tmp/test-gin-project)", "Bash(cd /tmp && mkdir -p test-gin-project && cd test-gin-project && touch go.mod && bash /Users/liuqianli/work/skills/skills/gin-openapi-json/scripts/generate.sh PUT /api/v2/scanner/detect/policy --output docs/sub/openapi.json && test -d docs/sub && echo \"docs/sub directory created: YES\" && rm -rf /tmp/test-gin-project)", "Bash(find /Users/liuqianli/work/skills -maxdepth 2 -name '~' -o -name '*~' 2>/dev/null | head -20; echo \"---\"; ls -la /Users/liuqianli/work/skills/ | grep '~')"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

